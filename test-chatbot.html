<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahm Faris - Chatbot Test Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .config-section {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        .config-section h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
        }

        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        .chat-container {
            height: 400px;
            overflow-y: auto;
            padding: 20px 30px;
            background: white;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: #f1f3f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.system .message-content {
            background: #fff3cd;
            color: #856404;
            max-width: 100%;
            text-align: center;
            font-size: 13px;
        }

        .message.error .message-content {
            background: #f8d7da;
            color: #721c24;
            max-width: 100%;
        }

        .sources {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            font-size: 12px;
        }

        .sources strong {
            display: block;
            margin-bottom: 5px;
        }

        .source-item {
            margin: 5px 0;
            padding: 5px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 4px;
        }

        .source-item a {
            color: #667eea;
            text-decoration: none;
        }

        .source-item a:hover {
            text-decoration: underline;
        }

        .input-section {
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-wrapper button {
            padding: 12px 30px;
            border-radius: 25px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        .clear-btn {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        .clear-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Fahm Faris Chatbot</h1>
            <p>Ask questions about IBM Maximo, Guardium, MaaS360, IBM Cloud & more</p>
        </div>

        <div class="config-section">
            <h3>API Configuration <span id="connectionStatus" class="status disconnected">Not Connected</span></h3>
            <div class="input-group">
                <label for="apiUrl">API URL</label>
                <input type="text" id="apiUrl" placeholder="https://your-service.onrender.com" value="">
            </div>
            <div class="input-group">
                <label for="apiKey">API Key</label>
                <input type="password" id="apiKey" placeholder="Enter your API key" value="">
            </div>
            <button class="btn btn-success" onclick="testConnection()">Test Connection</button>
            <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message system">
                <div class="message-content">
                    👋 Welcome! Configure your API settings above and start asking questions about IBM products (Maximo, Guardium, MaaS360, IBM Cloud, and more).
                </div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Ask about IBM Maximo, Guardium, MaaS360, IBM Cloud, or any IBM product..." onkeypress="handleKeyPress(event)">
                <button class="btn btn-primary" onclick="sendMessage()" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        let conversationId = generateConversationId();

        function generateConversationId() {
            return 'conv_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function addMessage(content, type = 'user', sources = null) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            let messageContent = `<div class="message-content">${escapeHtml(content)}`;
            
            if (sources && sources.length > 0) {
                messageContent += '<div class="sources"><strong>📚 Sources:</strong>';
                sources.forEach((source, index) => {
                    const scoreText = source.score !== undefined ? ` (Score: ${source.score.toFixed(2)})` : '';
                    messageContent += `<div class="source-item">${index + 1}. <a href="${escapeHtml(source.url)}" target="_blank">${escapeHtml(source.title)}</a>${scoreText}</div>`;
                });
                messageContent += '</div>';
            }
            
            messageContent += '</div>';
            messageDiv.innerHTML = messageContent;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const chatContainer = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function testConnection() {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const statusElement = document.getElementById('connectionStatus');

            if (!apiUrl) {
                addMessage('Please enter an API URL', 'error');
                return;
            }

            statusElement.textContent = 'Testing...';
            statusElement.className = 'status';

            try {
                const response = await fetch(`${apiUrl}/api/health`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    statusElement.textContent = 'Connected ✓';
                    statusElement.className = 'status connected';
                    addMessage(`✅ Connection successful! API Version: ${data.version || 'Unknown'}`, 'system');
                } else {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                statusElement.textContent = 'Disconnected ✗';
                statusElement.className = 'status disconnected';
                addMessage(`❌ Connection failed: ${error.message}`, 'error');
            }
        }

        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const message = messageInput.value.trim();
            const sendBtn = document.getElementById('sendBtn');

            if (!message) return;
            if (!apiUrl) {
                addMessage('Please configure API URL first', 'error');
                return;
            }

            // Add user message
            addMessage(message, 'user');
            messageInput.value = '';

            // Disable send button and show typing indicator
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<div class="loading"></div>';
            showTypingIndicator();

            try {
                const response = await fetch(`${apiUrl}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: message,
                        conversation_id: conversationId
                    })
                });

                removeTypingIndicator();

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || `HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                // Add assistant response with sources
                addMessage(data.answer, 'assistant', data.sources);

            } catch (error) {
                removeTypingIndicator();
                addMessage(`Error: ${error.message}`, 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function clearChat() {
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.innerHTML = '<div class="message system"><div class="message-content">Chat cleared. Start a new conversation!</div></div>';
            conversationId = generateConversationId();
        }

        // Load saved configuration from localStorage
        window.addEventListener('load', () => {
            const savedApiUrl = localStorage.getItem('apiUrl');
            const savedApiKey = localStorage.getItem('apiKey');
            
            if (savedApiUrl) document.getElementById('apiUrl').value = savedApiUrl;
            if (savedApiKey) document.getElementById('apiKey').value = savedApiKey;
        });

        // Save configuration to localStorage
        document.getElementById('apiUrl').addEventListener('change', (e) => {
            localStorage.setItem('apiUrl', e.target.value);
        });

        document.getElementById('apiKey').addEventListener('change', (e) => {
            localStorage.setItem('apiKey', e.target.value);
        });
    </script>
</body>
</html>
